worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # Default load-balancing method is round-robin. Deliberately no ip_hash /
    # sticky sessions here: any gateway replica can serve any user's WebSocket
    # connection because room fanout and direct delivery ride Redis pub/sub,
    # not in-process state pinned to one instance.
    upstream gateways {
        server gateway1:8000;
        server gateway2:8000;
        server gateway3:8000;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    server {
        listen 80;

        # Static chat client, served from the same origin as the API/WS
        # traffic below so the browser needs no CORS config to talk to it.
        # try_files (not `index`) avoids an internal redirect to /index.html
        # that would otherwise get re-matched against location blocks from
        # scratch and fall through to the proxy_pass below.
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location / {
            proxy_pass http://gateways;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # WebSocket connections are long-lived; don't let idle keepalive
            # timeouts kill them.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
