<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>realtime-messaging-infra chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    color-scheme: light dark;
    --border: #d0d0d8;
    --muted: #6b7280;
    --bg-soft: #f4f5f7;
    --accent: #3b5bdb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --border: #3a3a42;
      --muted: #9aa0a6;
      --bg-soft: #202127;
      --accent: #7d94ff;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: canvastext;
    background: canvas;
  }
  header {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  header h1 { font-size: 1rem; margin: 0; font-weight: 600; }
  #status { font-size: 0.85rem; color: var(--muted); }
  #status .dot {
    display: inline-block;
    width: 0.5rem;
    height: 0.5rem;
    border-radius: 50%;
    margin-right: 0.4rem;
    background: #d33;
  }
  #status.online .dot { background: #2ea043; }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .panel {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
  }

  .row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .row input {
    flex: 1;
    min-width: 8rem;
  }

  input, button {
    font: inherit;
    padding: 0.5rem 0.65rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: canvas;
    color: canvastext;
  }
  button {
    cursor: pointer;
    background: var(--accent);
    color: white;
    border-color: transparent;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  button.secondary {
    background: transparent;
    color: canvastext;
    border-color: var(--border);
  }

  #log {
    list-style: none;
    margin: 0;
    padding: 0;
    height: 22rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    background: var(--bg-soft);
    border-radius: 8px;
    padding: 0.75rem;
  }
  #log li { font-size: 0.9rem; line-height: 1.35; }
  #log li.system { color: var(--muted); font-style: italic; }
  #log .meta { color: var(--muted); font-size: 0.75rem; margin-left: 0.4rem; }
  #log .sender { font-weight: 600; }

  #composer { display: flex; gap: 0.5rem; }
  #composer input { flex: 1; }
</style>
</head>
<body>
<header>
  <h1>realtime-messaging-infra</h1>
  <div id="status"><span class="dot"></span><span id="status-text">disconnected</span></div>
</header>

<main>
  <section class="panel">
    <div class="row">
      <input id="username" placeholder="username (e.g. alice)" autocomplete="off" />
      <button id="connect-btn">Connect</button>
      <button id="disconnect-btn" class="secondary" disabled>Disconnect</button>
    </div>
  </section>

  <section class="panel">
    <div class="row">
      <input id="room" placeholder="room (e.g. general)" autocomplete="off" />
      <button id="join-btn" disabled>Join</button>
      <button id="leave-btn" class="secondary" disabled>Leave</button>
      <button id="mark-read-btn" class="secondary" disabled>Mark read</button>
    </div>
  </section>

  <section class="panel">
    <ul id="log"></ul>
    <form id="composer" style="margin-top: 0.75rem;">
      <input id="message" placeholder="message" autocomplete="off" disabled />
      <button id="send-btn" type="submit" disabled>Send</button>
    </form>
  </section>
</main>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const statusEl = $("status");
  const statusText = $("status-text");
  const log = $("log");

  const usernameEl = $("username");
  const connectBtn = $("connect-btn");
  const disconnectBtn = $("disconnect-btn");

  const roomEl = $("room");
  const joinBtn = $("join-btn");
  const leaveBtn = $("leave-btn");
  const markReadBtn = $("mark-read-btn");

  const composer = $("composer");
  const messageEl = $("message");
  const sendBtn = $("send-btn");

  const RECONNECT_BASE_MS = 1000;
  const RECONNECT_MAX_MS = 10000;

  let ws = null;
  let gatewayId = null;
  let currentRoom = null;
  let lastSortKey = null;

  // A close because the server/network dropped us should auto-reconnect
  // with backoff and rejoin whatever room we were in (unread tracking
  // already makes "rejoin after a gap" the correct, tested path — see
  // tests/integration/test_*_outage.py and test_majority_failure.py,
  // which is exactly the kind of event this is meant to ride out). A close
  // because the user clicked Disconnect should not.
  let manualDisconnect = false;
  let reconnectTimer = null;
  let reconnectAttempt = 0;
  let activeUsername = null;
  let rejoinRoom = null;

  function appendLine({ text, sender, meta, system }) {
    const li = document.createElement("li");
    if (system) li.className = "system";
    if (sender) {
      const s = document.createElement("span");
      s.className = "sender";
      s.textContent = sender + ": ";
      li.appendChild(s);
    }
    li.appendChild(document.createTextNode(text));
    if (meta) {
      const m = document.createElement("span");
      m.className = "meta";
      m.textContent = meta;
      li.appendChild(m);
    }
    log.appendChild(li);
    log.scrollTop = log.scrollHeight;
  }

  function render() {
    const connected = !!gatewayId;
    const reconnecting = !!reconnectTimer;
    const joined = connected && currentRoom !== null;

    statusEl.classList.toggle("online", connected);
    if (connected) {
      statusText.textContent = `connected via ${gatewayId}`;
    } else if (reconnecting) {
      statusText.textContent = `reconnecting… (attempt ${reconnectAttempt})`;
    } else {
      statusText.textContent = "disconnected";
    }

    connectBtn.disabled = connected || reconnecting;
    usernameEl.disabled = connected || reconnecting;
    disconnectBtn.disabled = !connected && !reconnecting;

    joinBtn.disabled = !connected || joined;
    leaveBtn.disabled = !joined;
    markReadBtn.disabled = !joined;
    messageEl.disabled = !joined;
    sendBtn.disabled = !joined;
    roomEl.disabled = joined;
  }

  async function loadHistory(roomId) {
    try {
      const res = await fetch(`/rooms/${encodeURIComponent(roomId)}/messages?limit=50`);
      const data = await res.json();
      for (const m of data.messages) {
        appendLine({
          sender: m.sender_id,
          text: m.text,
          meta: new Date(m.timestamp_ms).toLocaleTimeString(),
        });
        lastSortKey = m.sort_key;
      }
    } catch (e) {
      appendLine({ system: true, text: `failed to load history: ${e}` });
    }
  }

  function scheduleReconnect() {
    reconnectAttempt += 1;
    const delay = Math.min(RECONNECT_BASE_MS * 2 ** (reconnectAttempt - 1), RECONNECT_MAX_MS);
    appendLine({
      system: true,
      text: `connection lost — reconnecting in ${(delay / 1000).toFixed(0)}s (attempt ${reconnectAttempt})…`,
    });
    render();
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      connect(activeUsername);
    }, delay);
  }

  function cancelReconnect() {
    if (!reconnectTimer) return;
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
    reconnectAttempt = 0;
    rejoinRoom = null;
    appendLine({ system: true, text: "reconnect cancelled" });
    render();
  }

  function connect(username) {
    activeUsername = username;
    manualDisconnect = false;

    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws/${encodeURIComponent(username)}`);

    ws.addEventListener("open", () => {
      appendLine({ system: true, text: "socket open" });
    });

    ws.addEventListener("close", () => {
      appendLine({ system: true, text: "socket closed" });
      const wasInRoom = currentRoom;
      ws = null;
      gatewayId = null;
      currentRoom = null;
      lastSortKey = null;

      if (manualDisconnect) {
        manualDisconnect = false;
        reconnectAttempt = 0;
        render();
        return;
      }

      rejoinRoom = wasInRoom;
      render();
      scheduleReconnect();
    });

    ws.addEventListener("error", () => {
      appendLine({ system: true, text: "socket error" });
    });

    ws.addEventListener("message", (event) => {
      const frame = JSON.parse(event.data);
      switch (frame.type) {
        case "connected":
          gatewayId = frame.gateway_id;
          reconnectAttempt = 0;
          appendLine({ system: true, text: `connected as ${frame.user_id}, served by ${gatewayId}` });
          render();
          if (rejoinRoom) {
            const roomToRejoin = rejoinRoom;
            rejoinRoom = null;
            roomEl.value = roomToRejoin;
            ws.send(JSON.stringify({ type: "join", room_id: roomToRejoin }));
          }
          break;
        case "joined":
          currentRoom = frame.room_id;
          render();
          appendLine({
            system: true,
            text:
              frame.unread_count > 0
                ? `joined room "${frame.room_id}" — ${frame.unread_count} unread`
                : `joined room "${frame.room_id}" — caught up`,
          });
          loadHistory(frame.room_id);
          break;
        case "left":
          currentRoom = null;
          render();
          appendLine({ system: true, text: `left room "${frame.room_id}"` });
          break;
        case "message":
          appendLine({
            sender: frame.sender_id,
            text: frame.text,
            meta: new Date(frame.timestamp_ms).toLocaleTimeString(),
          });
          lastSortKey = frame.sort_key;
          break;
        case "read_ack":
          appendLine({ system: true, text: `marked "${frame.room_id}" read` });
          break;
        case "error":
          appendLine({
            system: true,
            text:
              frame.error === "rate_limited"
                ? `sending too fast — try again in ${frame.retry_after_seconds}s`
                : `error: ${frame.error}`,
          });
          break;
      }
    });

    render();
  }

  connectBtn.addEventListener("click", () => {
    const username = usernameEl.value.trim();
    if (!username) return;
    reconnectAttempt = 0;
    rejoinRoom = null;
    connect(username);
  });

  disconnectBtn.addEventListener("click", () => {
    if (reconnectTimer) {
      cancelReconnect();
      return;
    }
    if (ws) {
      manualDisconnect = true;
      ws.close();
    }
  });

  joinBtn.addEventListener("click", () => {
    const roomId = roomEl.value.trim();
    if (!roomId || !ws) return;
    ws.send(JSON.stringify({ type: "join", room_id: roomId }));
  });

  leaveBtn.addEventListener("click", () => {
    if (!ws || !currentRoom) return;
    ws.send(JSON.stringify({ type: "leave", room_id: currentRoom }));
  });

  markReadBtn.addEventListener("click", () => {
    if (!ws || !currentRoom || !lastSortKey) return;
    ws.send(JSON.stringify({ type: "mark_read", room_id: currentRoom, sort_key: lastSortKey }));
  });

  composer.addEventListener("submit", (event) => {
    event.preventDefault();
    const text = messageEl.value.trim();
    if (!text || !ws || !currentRoom) return;
    ws.send(
      JSON.stringify({
        type: "send",
        room_id: currentRoom,
        text,
        client_msg_id: crypto.randomUUID(),
        sent_at_ms: Date.now(),
      })
    );
    messageEl.value = "";
  });
})();
</script>
</body>
</html>
